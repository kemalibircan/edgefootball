services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - SPORTMONKS_API_TOKEN=${SPORTMONKS_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5}
      - DB_URL=postgresql://football:football@db:5432/football
      - DB_RUN_STARTUP_MIGRATIONS=${DB_RUN_STARTUP_MIGRATIONS:-true}
      - DB_MIGRATIONS_DIR=${DB_MIGRATIONS_DIR:-migrations}
      - REDIS_URL=redis://redis:6379/0
      - DUMMY_MODE=${DUMMY_MODE:-false}
      - FIXTURE_CACHE_LEAGUE_IDS=${FIXTURE_CACHE_LEAGUE_IDS:-600,564,8,384,2,5}
      - FIXTURE_CACHE_HORIZON_DAYS=${FIXTURE_CACHE_HORIZON_DAYS:-7}
      - FIXTURE_CACHE_REFRESH_HOUR_UTC=${FIXTURE_CACHE_REFRESH_HOUR_UTC:-3}
      - FIXTURE_CACHE_REFRESH_MINUTE_UTC=${FIXTURE_CACHE_REFRESH_MINUTE_UTC:-15}
      - LEAGUE_MODEL_LEAGUE_IDS=${LEAGUE_MODEL_LEAGUE_IDS:-600,564,8,384,2,5}
      - LEAGUE_MODEL_TARGET_ROWS=${LEAGUE_MODEL_TARGET_ROWS:-1000}
      - LEAGUE_MODEL_MIN_ROWS=${LEAGUE_MODEL_MIN_ROWS:-600}
      - LEAGUE_MODEL_TRAINING_MODE=${LEAGUE_MODEL_TRAINING_MODE:-latest}
      - LEAGUE_MODEL_RETRAIN_WEEKDAY_UTC=${LEAGUE_MODEL_RETRAIN_WEEKDAY_UTC:-0}
      - LEAGUE_MODEL_RETRAIN_HOUR_UTC=${LEAGUE_MODEL_RETRAIN_HOUR_UTC:-3}
      - LEAGUE_MODEL_RETRAIN_MINUTE_UTC=${LEAGUE_MODEL_RETRAIN_MINUTE_UTC:-30}
      - COUPON_GENERATION_CREDIT_COST=${COUPON_GENERATION_CREDIT_COST:-15}
      - COUPON_GENERATION_RUN_TTL_HOURS=${COUPON_GENERATION_RUN_TTL_HOURS:-24}
      - COUPON_GENERATION_MAX_SIMULATIONS=${COUPON_GENERATION_MAX_SIMULATIONS:-90}
      - COUPON_GENERATION_SOFT_TIME_LIMIT_SECONDS=${COUPON_GENERATION_SOFT_TIME_LIMIT_SECONDS:-120}
      - AUTH_SECRET=${AUTH_SECRET:-change_this_in_production}
      - AUTH_SECRET_FALLBACKS=${AUTH_SECRET_FALLBACKS:-}
      - AUTH_TOKEN_TTL_HOURS=${AUTH_TOKEN_TTL_HOURS:-72}
      - AUTH_ACCESS_TOKEN_TTL_MINUTES=${AUTH_ACCESS_TOKEN_TTL_MINUTES:-15}
      - AUTH_REFRESH_TOKEN_TTL_DAYS=${AUTH_REFRESH_TOKEN_TTL_DAYS:-30}
      - AUTH_REFRESH_COOKIE_NAME=${AUTH_REFRESH_COOKIE_NAME:-football_ai_refresh}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-}
      - AUTH_INITIAL_CREDITS=${AUTH_INITIAL_CREDITS:-100}
      - AI_QUERY_CREDIT_COST=${AI_QUERY_CREDIT_COST:-10}
      - BOOTSTRAP_SUPERADMIN_EMAIL=${BOOTSTRAP_SUPERADMIN_EMAIL:-superadmin@footballai.local}
      - BOOTSTRAP_SUPERADMIN_PASSWORD=${BOOTSTRAP_SUPERADMIN_PASSWORD:-superadmin123}
      - AUTH_CODE_TTL_MINUTES=${AUTH_CODE_TTL_MINUTES:-10}
      - AUTH_CODE_RESEND_COOLDOWN_SECONDS=${AUTH_CODE_RESEND_COOLDOWN_SECONDS:-60}
      - AUTH_CODE_MAX_ATTEMPTS=${AUTH_CODE_MAX_ATTEMPTS:-5}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Football AI}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_TIMEOUT_SECONDS=${SMTP_TIMEOUT_SECONDS:-20}
      - SMTP_RETRY_ATTEMPTS=${SMTP_RETRY_ATTEMPTS:-2}
      - SMTP_RETRY_BACKOFF_SECONDS=${SMTP_RETRY_BACKOFF_SECONDS:-1.0}
      - SITE_BASE_URL=${SITE_BASE_URL:-http://localhost:3001}
    volumes:
      - ./:/app
      - ./artifacts:/app/artifacts
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A worker.celery_app worker -l info
    environment:
      - SPORTMONKS_API_TOKEN=${SPORTMONKS_API_TOKEN}
      - DB_URL=postgresql://football:football@db:5432/football
      - DB_RUN_STARTUP_MIGRATIONS=${DB_RUN_STARTUP_MIGRATIONS:-true}
      - DB_MIGRATIONS_DIR=${DB_MIGRATIONS_DIR:-migrations}
      - REDIS_URL=redis://redis:6379/0
      - DUMMY_MODE=${DUMMY_MODE:-false}
      - FIXTURE_CACHE_LEAGUE_IDS=${FIXTURE_CACHE_LEAGUE_IDS:-600,564,8,384,2,5}
      - FIXTURE_CACHE_HORIZON_DAYS=${FIXTURE_CACHE_HORIZON_DAYS:-7}
      - FIXTURE_CACHE_REFRESH_HOUR_UTC=${FIXTURE_CACHE_REFRESH_HOUR_UTC:-3}
      - FIXTURE_CACHE_REFRESH_MINUTE_UTC=${FIXTURE_CACHE_REFRESH_MINUTE_UTC:-15}
      - LEAGUE_MODEL_LEAGUE_IDS=${LEAGUE_MODEL_LEAGUE_IDS:-600,564,8,384,2,5}
      - LEAGUE_MODEL_TARGET_ROWS=${LEAGUE_MODEL_TARGET_ROWS:-1000}
      - LEAGUE_MODEL_MIN_ROWS=${LEAGUE_MODEL_MIN_ROWS:-600}
      - LEAGUE_MODEL_TRAINING_MODE=${LEAGUE_MODEL_TRAINING_MODE:-latest}
      - LEAGUE_MODEL_RETRAIN_WEEKDAY_UTC=${LEAGUE_MODEL_RETRAIN_WEEKDAY_UTC:-0}
      - LEAGUE_MODEL_RETRAIN_HOUR_UTC=${LEAGUE_MODEL_RETRAIN_HOUR_UTC:-3}
      - LEAGUE_MODEL_RETRAIN_MINUTE_UTC=${LEAGUE_MODEL_RETRAIN_MINUTE_UTC:-30}
      - COUPON_GENERATION_CREDIT_COST=${COUPON_GENERATION_CREDIT_COST:-15}
      - COUPON_GENERATION_RUN_TTL_HOURS=${COUPON_GENERATION_RUN_TTL_HOURS:-24}
      - COUPON_GENERATION_MAX_SIMULATIONS=${COUPON_GENERATION_MAX_SIMULATIONS:-90}
      - COUPON_GENERATION_SOFT_TIME_LIMIT_SECONDS=${COUPON_GENERATION_SOFT_TIME_LIMIT_SECONDS:-120}
      - AUTH_SECRET=${AUTH_SECRET:-change_this_in_production}
      - AUTH_SECRET_FALLBACKS=${AUTH_SECRET_FALLBACKS:-}
      - AUTH_TOKEN_TTL_HOURS=${AUTH_TOKEN_TTL_HOURS:-72}
      - AUTH_ACCESS_TOKEN_TTL_MINUTES=${AUTH_ACCESS_TOKEN_TTL_MINUTES:-15}
      - AUTH_REFRESH_TOKEN_TTL_DAYS=${AUTH_REFRESH_TOKEN_TTL_DAYS:-30}
      - AUTH_REFRESH_COOKIE_NAME=${AUTH_REFRESH_COOKIE_NAME:-football_ai_refresh}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-}
      - AUTH_INITIAL_CREDITS=${AUTH_INITIAL_CREDITS:-100}
      - AI_QUERY_CREDIT_COST=${AI_QUERY_CREDIT_COST:-10}
      - BOOTSTRAP_SUPERADMIN_EMAIL=${BOOTSTRAP_SUPERADMIN_EMAIL:-superadmin@footballai.local}
      - BOOTSTRAP_SUPERADMIN_PASSWORD=${BOOTSTRAP_SUPERADMIN_PASSWORD:-superadmin123}
      - AUTH_CODE_TTL_MINUTES=${AUTH_CODE_TTL_MINUTES:-10}
      - AUTH_CODE_RESEND_COOLDOWN_SECONDS=${AUTH_CODE_RESEND_COOLDOWN_SECONDS:-60}
      - AUTH_CODE_MAX_ATTEMPTS=${AUTH_CODE_MAX_ATTEMPTS:-5}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Football AI}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_TIMEOUT_SECONDS=${SMTP_TIMEOUT_SECONDS:-20}
      - SMTP_RETRY_ATTEMPTS=${SMTP_RETRY_ATTEMPTS:-2}
      - SMTP_RETRY_BACKOFF_SECONDS=${SMTP_RETRY_BACKOFF_SECONDS:-1.0}
    volumes:
      - ./:/app
      - ./artifacts:/app/artifacts
    depends_on:
      - db
      - redis

  worker-beat:
    build: .
    command: celery -A worker.celery_app beat -l info
    environment:
      - SPORTMONKS_API_TOKEN=${SPORTMONKS_API_TOKEN}
      - DB_URL=postgresql://football:football@db:5432/football
      - DB_RUN_STARTUP_MIGRATIONS=${DB_RUN_STARTUP_MIGRATIONS:-true}
      - DB_MIGRATIONS_DIR=${DB_MIGRATIONS_DIR:-migrations}
      - REDIS_URL=redis://redis:6379/0
      - DUMMY_MODE=${DUMMY_MODE:-false}
      - FIXTURE_CACHE_LEAGUE_IDS=${FIXTURE_CACHE_LEAGUE_IDS:-600,564,8,384,2,5}
      - FIXTURE_CACHE_HORIZON_DAYS=${FIXTURE_CACHE_HORIZON_DAYS:-7}
      - FIXTURE_CACHE_REFRESH_HOUR_UTC=${FIXTURE_CACHE_REFRESH_HOUR_UTC:-3}
      - FIXTURE_CACHE_REFRESH_MINUTE_UTC=${FIXTURE_CACHE_REFRESH_MINUTE_UTC:-15}
      - LEAGUE_MODEL_LEAGUE_IDS=${LEAGUE_MODEL_LEAGUE_IDS:-600,564,8,384,2,5}
      - LEAGUE_MODEL_TARGET_ROWS=${LEAGUE_MODEL_TARGET_ROWS:-1000}
      - LEAGUE_MODEL_MIN_ROWS=${LEAGUE_MODEL_MIN_ROWS:-600}
      - LEAGUE_MODEL_TRAINING_MODE=${LEAGUE_MODEL_TRAINING_MODE:-latest}
      - LEAGUE_MODEL_RETRAIN_WEEKDAY_UTC=${LEAGUE_MODEL_RETRAIN_WEEKDAY_UTC:-0}
      - LEAGUE_MODEL_RETRAIN_HOUR_UTC=${LEAGUE_MODEL_RETRAIN_HOUR_UTC:-3}
      - LEAGUE_MODEL_RETRAIN_MINUTE_UTC=${LEAGUE_MODEL_RETRAIN_MINUTE_UTC:-30}
      - COUPON_GENERATION_CREDIT_COST=${COUPON_GENERATION_CREDIT_COST:-15}
      - COUPON_GENERATION_RUN_TTL_HOURS=${COUPON_GENERATION_RUN_TTL_HOURS:-24}
      - COUPON_GENERATION_MAX_SIMULATIONS=${COUPON_GENERATION_MAX_SIMULATIONS:-90}
      - COUPON_GENERATION_SOFT_TIME_LIMIT_SECONDS=${COUPON_GENERATION_SOFT_TIME_LIMIT_SECONDS:-120}
      - AUTH_SECRET=${AUTH_SECRET:-change_this_in_production}
      - AUTH_SECRET_FALLBACKS=${AUTH_SECRET_FALLBACKS:-}
      - AUTH_TOKEN_TTL_HOURS=${AUTH_TOKEN_TTL_HOURS:-72}
      - AUTH_ACCESS_TOKEN_TTL_MINUTES=${AUTH_ACCESS_TOKEN_TTL_MINUTES:-15}
      - AUTH_REFRESH_TOKEN_TTL_DAYS=${AUTH_REFRESH_TOKEN_TTL_DAYS:-30}
      - AUTH_REFRESH_COOKIE_NAME=${AUTH_REFRESH_COOKIE_NAME:-football_ai_refresh}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-}
      - AUTH_INITIAL_CREDITS=${AUTH_INITIAL_CREDITS:-100}
      - AI_QUERY_CREDIT_COST=${AI_QUERY_CREDIT_COST:-10}
      - BOOTSTRAP_SUPERADMIN_EMAIL=${BOOTSTRAP_SUPERADMIN_EMAIL:-superadmin@footballai.local}
      - BOOTSTRAP_SUPERADMIN_PASSWORD=${BOOTSTRAP_SUPERADMIN_PASSWORD:-superadmin123}
      - AUTH_CODE_TTL_MINUTES=${AUTH_CODE_TTL_MINUTES:-10}
      - AUTH_CODE_RESEND_COOLDOWN_SECONDS=${AUTH_CODE_RESEND_COOLDOWN_SECONDS:-60}
      - AUTH_CODE_MAX_ATTEMPTS=${AUTH_CODE_MAX_ATTEMPTS:-5}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Football AI}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_TIMEOUT_SECONDS=${SMTP_TIMEOUT_SECONDS:-20}
      - SMTP_RETRY_ATTEMPTS=${SMTP_RETRY_ATTEMPTS:-2}
      - SMTP_RETRY_BACKOFF_SECONDS=${SMTP_RETRY_BACKOFF_SECONDS:-1.0}
    volumes:
      - ./:/app
      - ./artifacts:/app/artifacts
    depends_on:
      - db
      - redis

  web:
    image: node:20-alpine
    working_dir: /web
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 3001"
    volumes:
      - ./web:/web
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
      - VITE_SITE_BASE_URL=${VITE_SITE_BASE_URL:-http://localhost:3001}
      - VITE_GOOGLE_WEB_CLIENT_ID=${VITE_GOOGLE_WEB_CLIENT_ID:-}
      - GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID:-}
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  pgdata:
